<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style data-landing-style-guard>
      #root {
        visibility: var(--landing-root-visibility, hidden);
      }
    </style>
    <meta name="description" content="%SEO_DESCRIPTION%" />
    <meta name="robots" content="%SEO_ROBOTS%" />
    <meta name="theme-color" content="%SEO_THEME_COLOR%" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="%SEO_SITE_NAME%" />
    <meta property="og:title" content="%SEO_TITLE%" />
    <meta property="og:description" content="%SEO_DESCRIPTION%" />
    <meta property="og:url" content="%SEO_SITE_URL%" />
    <meta property="og:locale" content="%SEO_LOCALE%" />
    <meta property="og:image" content="%SEO_SOCIAL_IMAGE_URL%" />
    <meta property="og:image:type" content="%SEO_SOCIAL_IMAGE_TYPE%" />
    <meta property="og:image:width" content="%SEO_SOCIAL_IMAGE_WIDTH%" />
    <meta property="og:image:height" content="%SEO_SOCIAL_IMAGE_HEIGHT%" />
    <meta property="og:image:alt" content="%SEO_SOCIAL_IMAGE_ALT%" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="%SEO_TITLE%" />
    <meta name="twitter:description" content="%SEO_DESCRIPTION%" />
    <meta name="twitter:image" content="%SEO_SOCIAL_IMAGE_URL%" />
    <meta name="twitter:image:alt" content="%SEO_SOCIAL_IMAGE_ALT%" />
    <link rel="canonical" href="%SEO_SITE_URL%" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="preload" as="image" href="/Lab-nobg.png" type="image/png" fetchpriority="high" />
    <title>%SEO_TITLE%</title>
    <script type="application/ld+json">
      %SEO_JSON_LD%
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
