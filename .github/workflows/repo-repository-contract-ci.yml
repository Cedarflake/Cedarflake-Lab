name: "[Repo] Repository Contract CI"

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.7.0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22.22.2
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install repository contract dependencies
        run: pnpm --filter cedarflake-lab install --frozen-lockfile

      - name: Verify repository contract
        run: pnpm check:repository-contract
