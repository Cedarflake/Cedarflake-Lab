name: "[Project] YouTube Auto Resume CI"

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "others/userscripts/youtube-auto-resume/**"
      - "pnpm-workspace.yaml"
      - ".github/workflows/project-youtube-auto-resume-ci.yml"
  push:
    branches:
      - main
    paths:
      - "others/userscripts/youtube-auto-resume/**"
      - "pnpm-workspace.yaml"
      - ".github/workflows/project-youtube-auto-resume-ci.yml"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.7.0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm --filter @cedarflake/youtube-auto-resume --fail-if-no-match install --frozen-lockfile

      - name: Check userscript version
        if: github.event_name == 'pull_request'
        run: pnpm --filter @cedarflake/youtube-auto-resume --fail-if-no-match version:check --base-ref=${{ github.event.pull_request.base.sha }}

      - name: Check userscript version on push
        if: github.event_name == 'push' && github.event.before != '0000000000000000000000000000000000000000'
        run: pnpm --filter @cedarflake/youtube-auto-resume --fail-if-no-match version:check --base-ref=${{ github.event.before }}

      - name: Audit YouTube userscript dependencies
        run: pnpm --config.registry=https://registry.npmjs.org/ --filter @cedarflake/youtube-auto-resume --fail-if-no-match audit --audit-level high

      - name: Install Playwright browser
        run: pnpm --dir others/userscripts/youtube-auto-resume exec playwright install --with-deps chromium

      - name: Check YouTube userscript
        run: pnpm --filter @cedarflake/youtube-auto-resume --fail-if-no-match check
